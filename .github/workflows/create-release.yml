name: Create Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "发布标签（例如 v1.0.1）"
        required: true
        type: string
      target:
        description: "目标分支或提交（默认 main）"
        required: false
        default: "main"
        type: string

permissions: {}

jobs:
  release:
    name: 创建 GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 校验 tag 格式
        env:
          TAG: ${{ inputs.tag }}
        run: |
          # 中文注释：仅允许常见语义化版本前缀，避免误发非法 tag
          if ! echo "${TAG}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$'; then
            echo "::error::tag 必须为 vX.Y.Z（可带 -rc.1 等后缀）"
            exit 1
          fi

      - name: 创建 Release
        uses: actions/github-script@v7
        env:
          TAG: ${{ inputs.tag }}
          TARGET: ${{ inputs.target }}
        with:
          script: |
            // 中文注释：只做最小发布动作，自动生成 release notes
            const tag = process.env.TAG;
            const target = process.env.TARGET || 'main';

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: target,
              name: tag,
              generate_release_notes: true,
              draft: false,
              prerelease: false,
            });

      - name: 兜底触发 Docker 发布
        uses: actions/github-script@v7
        env:
          TAG: ${{ inputs.tag }}
          TARGET: ${{ inputs.target }}
        with:
          script: |
            // 中文注释：部分场景 release 事件不会触发后续 workflow，这里做兜底触发
            const tag = process.env.TAG;
            const target = process.env.TARGET || 'main';
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docker_release_auto.yml',
              ref: target,
              inputs: {
                tag,
              },
            });
