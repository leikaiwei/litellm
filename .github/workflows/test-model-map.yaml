name: Validate model_prices_and_context_window.json

on:
  # 中文注释：只在 main 分支推送时触发，避免其他分支触发 CI
  push:
    branches: [ main ]

jobs:
  validate-model-prices-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate model_prices_and_context_window.json
        run: |
          jq empty model_prices_and_context_window.json
