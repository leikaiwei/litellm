name: Auto Publish Docker & GHCR

on:
  # 中文注释：仅 main 分支自动化，子分支不触发
  push:
    branches:
      - "main"
  workflow_dispatch:

env:
  # 中文注释：GHCR 目标
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE: ${{ github.repository }}
  # 中文注释：Docker Hub 目标仓库，优先读取 Repository Variables
  DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_REPOSITORY || github.repository }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        shell: bash
        run: |
          # 中文注释：main 分支固定打 main 标签，同时叠加 latest
          echo "value=main" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          # 中文注释：GitHub Actions 默认注入，无需手动新建 Repository Secret
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (Docker Hub + GHCR)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.tag.outputs.value }}
            ${{ env.DOCKERHUB_IMAGE }}:latest
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE }}:${{ steps.tag.outputs.value }}
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE }}:latest
