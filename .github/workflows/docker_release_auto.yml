name: Auto Publish Docker & GHCR

on:
  # 中文注释：发布 Release 后自动构建并推送镜像
  release:
    types:
      - published

env:
  # 中文注释：GHCR 镜像名，默认使用当前仓库
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE: ${{ github.repository }}
  # 中文注释：Docker Hub 仓库名支持仓库变量覆盖
  DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_REPOSITORY || github.repository }}

permissions: {}

jobs:
  build-and-publish:
    name: 构建并发布 Docker 镜像
    runs-on: ubuntu-latest
    # 中文注释：同一个 tag 仅允许一次发布任务，避免重复推送冲突
    concurrency:
      group: docker-release-${{ github.event.release.tag_name }}
      cancel-in-progress: true
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 计算镜像标签
        id: tag
        shell: bash
        run: |
          # 中文注释：镜像 tag 与 Release tag 保持一致
          echo "value=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"

      - name: 检查 Docker Hub 凭据
        id: dockerhub
        shell: bash
        run: |
          # 中文注释：Fork 或未配置密钥时，自动跳过 Docker Hub 推送，避免任务失败
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "已检测到 Docker Hub 凭据，启用推送。"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "未配置 Docker Hub 凭据，仅推送 GHCR。"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (GHCR)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE }}:${{ steps.tag.outputs.value }}
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE }}:latest

      - name: Build and push (Docker Hub)
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.tag.outputs.value }}
            ${{ env.DOCKERHUB_IMAGE }}:latest
